<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Snowboard Shop</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Загрузочный экран -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1>❄️ Сноуборд-сезон</h1>
            <div id="countdown">
                <span id="days">00</span>:
                <span id="hours">00</span>:
                <span id="minutes">00</span>:
                <span id="seconds">00</span>
            </div>
            <p id="splash-message">До первого снега осталось...</p>
            <button id="close-splash" class="splash-close-btn">Пропустить</button>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="app" style="display: none;">
        <header>
            <h1>🏔️ Snowboard Store</h1>
        </header>

        <main id="catalog">
            <!-- Карточки товаров рендерятся через JS -->
        </main>

        <!-- Нижняя навигация с иконками PNG -->
        <nav id="bottom-nav">
            <!-- Иконки загружаются из JS -->
        </nav>
    </div>

    <!-- Модальное окно для полного описания -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
