<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
    <title>Snowboard Shop</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Запрет зума и выделения */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        img, a, button {
            -webkit-touch-callout: none;
        }
        /* Убираем скролл у body */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <!-- ФОН (всегда виден) -->
    <div id="background-layer"></div>

    <!-- Загрузочный экран -->
    <div id="splash-screen">
        <div class="splash-content">
            <h1>❄️ Сноуборд-сезон</h1>
            <div id="countdown">
                <span id="days">00</span>:
                <span id="hours">00</span>:
                <span id="minutes">00</span>:
                <span id="seconds">00</span>
            </div>
            <p id="splash-message">До первого снега осталось...</p>
            <button id="close-splash" class="splash-close-btn">Пропустить</button>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="app" style="display: none;">
        <header>
            <h1>🏔️ Snowboard Store</h1>
        </header>

        <main id="catalog">
            <!-- Карточки товаров -->
        </main>

        <!-- Нижняя навигация -->
        <nav id="bottom-nav">
            <!-- Иконки из JS -->
        </nav>
    </div>

    <!-- Модальное окно -->
    <div id="product-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
