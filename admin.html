<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            margin-top: 40px;
            width: 100%;
            box-sizing: border-box;
        }
        .admin-container h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }
        .admin-form input, .admin-form textarea, .admin-form select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }
        .admin-form select option {
            background: #1a3a4a;
            color: #fff;
        }
        .admin-form button {
            background: #007AFF;
            border: none;
            padding: 16px;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .admin-form button:active {
            opacity: 0.7;
            transform: scale(0.98);
        }
        .admin-item {
            background: rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 16px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-item .item-info {
            flex: 1;
            min-width: 120px;
        }
        .admin-item .item-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .admin-item button {
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .admin-item button:active {
            opacity: 0.7;
            transform: scale(0.95);
        }
        .admin-item .edit-btn {
            background: #FF9500;
        }
        .admin-item .delete-btn {
            background: #FF3B30;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .back-link {
            color: #007AFF;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
        }
        #app {
            padding: 0 16px 20px 16px;
            min-height: 100vh;
        }
        @media (max-width: 380px) {
            .admin-item {
                flex-direction: column;
                align-items: stretch;
            }
            .admin-item .item-actions {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div id="app" style="display: block;">
        <div class="admin-container">
            <div class="admin-header">
                <h2>🛠️ Админ-панель</h2>
                <a href="index.html" class="back-link">← Назад</a>
            </div>
            
            <form id="product-form" class="admin-form">
                <input type="hidden" id="product-id" value="">
                <input type="text" id="product-name" placeholder="Название товара" required>
                <input type="text" id="product-price" placeholder="Цена (например: 49 990 ₽)" required>
                <input type="text" id="product-image" placeholder="URL картинки или эмодзи" required>
                <select id="product-category" required>
                    <option value="boards">🏂 Сноуборды</option>
                    <option value="bindings">⛓️ Крепления</option>
                    <option value="boots">🥾 Ботинки</option>
                    <option value="helmets">⛑️ Шлемы</option>
                    <option value="goggles">🥽 Очки</option>
                </select>
                <textarea id="product-desc" placeholder="Описание" rows="2"></textarea>
                <input type="text" id="product-specs" placeholder="Характеристики (через запятую)">
                <button type="submit">Сохранить товар</button>
            </form>

            <div id="product-list"></div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
